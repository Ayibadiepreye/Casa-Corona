# Render Blueprint — deploy via:
#   1. Push this repo to GitHub
#   2. In Render dashboard → "New" → "Blueprint"
#   3. Point Render at this repo; it'll read render.yaml
#   4. Set DATABASE_URL, REDIS_URL, PAYSTACK_*, RESEND_API_KEY, CLOUDINARY_*, JWT_SECRET, etc.
#      in the dashboard before first deploy (marked as sync:false below).

services:
  - type: web
    name: casa-corona-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: apps/api
    buildCommand: |
      cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @casa-corona/db build && pnpm --filter @casa-corona/api build
    startCommand: node dist/index.js
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: MAINTENANCE_MODE
        value: "false"
      - key: MAINTENANCE_MESSAGE
        value: "Casa Corona is undergoing maintenance. We'll be back soon."
      - key: SUPPORT_EMAIL
        sync: false

databases:
